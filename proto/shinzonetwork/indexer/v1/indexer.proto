syntax = "proto3";

package shinzonetwork.indexer.v1;

import "gogoproto/gogo.proto";

option go_package = "github.com/shinzonetwork/shinzohub/x/indexer/types";

message PendingClaim {
  string operator_address = 1;
  string connection_string = 2;
}

message Indexer {
  string source_chain = 1;
  uint64 source_chain_id = 2;
  bytes validator_pubkey = 3;
  bytes assertion_authority = 4;
  uint64 nonce = 5;
  bytes chain_specific = 6;

  string operator_address = 7;
  string payout_address = 8;

  bool registered = 9;
  string did = 10;
  string connection_string = 11;
}
