syntax = "proto3";

package shinzonetwork.indexer.v1;

import "cosmos/base/query/v1beta1/pagination.proto";
import "gogoproto/gogo.proto";
import "google/api/annotations.proto";
import "shinzonetwork/indexer/v1/indexer.proto";

option go_package = "github.com/shinzonetwork/shinzohub/x/indexer/types";

service Query {
  rpc Indexers(QueryIndexersRequest) returns (QueryIndexersResponse) {
    option (google.api.http).get = "/shinzonetwork/indexer/v1/indexers";
  }

  rpc Indexer(QueryIndexerRequest) returns (QueryIndexerResponse) {
    option (google.api.http).get = "/shinzonetwork/indexer/v1/validator/{source_chain_id}/{validator_pubkey}";
  }

  rpc IndexerByAddress(QueryIndexerByAddressRequest) returns (QueryIndexerByAddressResponse) {
    option (google.api.http).get = "/shinzonetwork/indexer/v1/indexers/{operator_address}";
  }

  rpc IndexerCount(QueryIndexerCountRequest) returns (QueryIndexerCountResponse) {
    option (google.api.http).get = "/shinzonetwork/indexer/v1/indexer_count";
  }
}

message QueryIndexersRequest {
  cosmos.base.query.v1beta1.PageRequest pagination = 1;
  uint64 source_chain_id = 2;
  // Exact DID filter.
  string did = 3;
  // Substring filter over Indexer.connection_string.
  string connection_string = 4;
}

message QueryIndexersResponse {
  repeated Indexer indexers = 1 [(gogoproto.nullable) = false];
  cosmos.base.query.v1beta1.PageResponse pagination = 2;
}

message QueryIndexerRequest {
  uint64 source_chain_id = 1;
  bytes validator_pubkey = 2;
}

message QueryIndexerResponse {
  Indexer indexer = 1 [(gogoproto.nullable) = false];
}

message QueryIndexerByAddressRequest {
  string operator_address = 1;
}

message QueryIndexerByAddressResponse {
  Indexer indexer = 1 [(gogoproto.nullable) = false];
}

message QueryIndexerCountRequest {}

message QueryIndexerCountResponse {
  uint64 count = 1;
}
