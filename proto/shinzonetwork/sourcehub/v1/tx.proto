syntax = "proto3";

package shinzonetwork.sourcehub.v1;

import "cosmos/msg/v1/msg.proto";

option go_package = "github.com/shinzonetwork/shinzohub/x/sourcehub/types";

// Msg defines the Msg service.
service Msg {
  option (cosmos.msg.v1.service) = true;

  rpc RegisterSourcehubICA(MsgRegisterSourcehubICA) returns (MsgRegisterSourcehubICAResponse);
  rpc RegisterShinzoPolicy(MsgRegisterShinzoPolicy) returns (MsgRegisterShinzoPolicyResponse);
  rpc RegisterShinzoObjects(MsgRegisterShinzoObjects) returns (MsgRegisterShinzoObjectsResponse);
  rpc RequestStreamAccess(MsgRequestStreamAccess) returns (MsgRequestStreamAccessResponse);
  rpc DeleteStreamAccess(MsgDeleteStreamAccess) returns (MsgDeleteStreamAccessResponse);
}

message MsgRegisterSourcehubICA {
  option (cosmos.msg.v1.signer) = "signer";

  string signer        = 1;
  string controller_connection_id = 2;
  string host_connection_id = 3;
}

message MsgRegisterSourcehubICAResponse {}

message MsgRegisterShinzoPolicy {
  option (cosmos.msg.v1.signer) = "signer";

  string signer      = 1;
}

message MsgRegisterShinzoPolicyResponse {}

enum Resource {
  RESOURCE_PRIMITIVE = 0;
  RESOURCE_VIEW   = 1;
}

message MsgRegisterShinzoObjects {
  option (cosmos.msg.v1.signer) = "signer";

  string signer        = 1;
  repeated string resources = 2;
}

message MsgRegisterShinzoObjectsResponse {
  uint64 sequence   = 1;
  string port_id    = 2;
  string channel_id = 3;
}

message MsgRequestStreamAccess {
  option (cosmos.msg.v1.signer) = "signer";

  string signer    = 1;
  Resource resource = 2;
  string stream_id = 3;
  string did       = 4;
  uint64 expiration = 5;
}

message MsgRequestStreamAccessResponse {
  uint64 sequence   = 1;
  string port_id    = 2;
  string channel_id = 3;
}

// MsgDeleteStreamAccess revokes a subscriber tuple on sourcehub via the
// shinzohub-controlled ICA channel. Admin-gated; mirrors
// MsgRequestStreamAccess but writes a DeleteRelationship instead of a
// SetRelationship. No expiration field: revocation is immediate.
message MsgDeleteStreamAccess {
  option (cosmos.msg.v1.signer) = "signer";

  string signer    = 1;
  Resource resource = 2;
  string stream_id = 3;
  string did       = 4;
}

message MsgDeleteStreamAccessResponse {
  uint64 sequence   = 1;
  string port_id    = 2;
  string channel_id = 3;
}

