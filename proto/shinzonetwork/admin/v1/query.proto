syntax = "proto3";

package shinzonetwork.admin.v1;

import "gogoproto/gogo.proto";
import "google/api/annotations.proto";
import "shinzonetwork/admin/v1/params.proto";

option go_package = "github.com/shinzonetwork/shinzohub/x/admin/types";

service Query {
  rpc Params(QueryParamsRequest) returns (QueryParamsResponse) {
    option (google.api.http).get = "/shinzonetwork/admin/v1/params";
  }
}

message QueryParamsRequest {}

message QueryParamsResponse {
  Params params = 1 [(gogoproto.nullable) = false];
}
